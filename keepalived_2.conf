global_defs {
    enable_script_security
    script_user root
}

vrrp_script chk_web {
    script "/usr/local/bin/check_web.sh"
    interval 3
    timeout 2
    weight -20
    fall 2
    rise 2
}

vrrp_instance VI_1 {
    interface enp0s8
    state BACKUP
    virtual_router_id 51
    priority 90         # Ниже чем на MASTER (100)
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass secret12
    }

    virtual_ipaddress {
        192.168.56.100/24
    }

    track_script {
        chk_web
    }
}

